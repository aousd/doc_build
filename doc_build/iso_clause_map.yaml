# ISO clause exceptions map for the AOUSD Core Specification.
#
# This file lists sections that should NOT receive an auto-assigned clause number.
# Sections absent from this file are numbered automatically (Clause 1, 2, 3 …)
# in the order they appear as level-1 headings in combined_spec.md.
#
# Key:   section identifier — folder name for folder-based sections
#        (e.g. "path_grammar"), or lowercased file stem for flat files
#        (e.g. "foreword" for Foreword.md).
#
# Value:
#   null          — unnumbered front/back matter (heading rendered as-is,
#                   links to it are left for filter_resolve_sections)
#   {annex: "A"}  — designates this section as Annex A (or B, C …);
#                   subclauses are numbered A.1, A.1.1, etc.

foreword:     null   # front matter, not a numbered clause
introduction: null   # front matter, not a numbered clause
closing:      null   # back matter; change to {annex: "A"} to make it Annex A
